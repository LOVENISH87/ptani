#     layout = dwindle
# }

# https://wiki.hyprland.org/Configuring/Variables/#decoration
# decoration {
#     rounding = 6
#     rounding_power = 2

#     # Change transparency of focused and unfocused windows
#     active_opacity = 11.0
#     inactive_opacity = 1.0

#     shadow {
#         enabled = true
#         range = 4
#         render_power = 3
#         color = rgba(1a1a1aee)
#     }

#     # https://wiki.hyprland.org/Configuring/Variables/#blur
    # blur {
    #     enabled = true
    #     size = 2
    #     passes = 1

    #     vibrancy = 0.1696
    # }
# }

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 2
    col.active_border = rgba(ffffffff) rgba(88eeffff) rgba(3399ffff) rgba(aaddffff) rgba(ffffffff) 45deg
    col.inactive_border = rgba(b4befecc) rgba(6c7086cc) 45deg
    layout = dwindle
    resize_on_border = true
}

group {
    col.border_active = rgba(ca9ee6ff) rgba(f2d5cfff) 45deg
    col.border_inactive = rgba(b4befecc) rgba(6c7086cc) 45deg
    col.border_locked_active = rgba(ca9ee6ff) rgba(f2d5cfff) 45deg
    col.border_locked_inactive = rgba(b4befecc) rgba(6c7086cc) 45deg
}

decoration {
    rounding = 8
    shadow:enabled = false

    blur {
        enabled = true
        size = 6
        passes = 3
        noise = 0.05
        xray= false
        new_optimizations = true
        ignore_opacity = true
popups = true
        
    }
}



# ▄▀█ █▄░█ █ █▀▄▀█ ▄▀█ ▀█▀ █ █▀█ █▄░█
# █▀█ █░▀█ █ █░▀░█ █▀█ ░█░ █ █▄█ █░▀█

animations {
    enabled = true
    bezier = linear,        0,    0,   1,    1
    bezier = spring,        0.05, 0.9, 0.1,  1.05
    bezier = easeOutExpo,   0.16, 1,   0.3,  1
    bezier = fluent_decel,  0.1,  1,   0,    1

    # open: slides up from below + fades in at same time (macOS feel)
    animation = windows,          1, 6, spring,       slidefadevert
    # close: smooth fade out — clean, not distracting
    # animation = windowsOut,       1, 4, fluent_decel, fade
    # move: fast smooth glide
    animation = windowsMove,      1, 4, easeOutExpo

    animation = border,           1, 10, default
    animation = borderangle,      1, 30, linear,      loop

    animation = fade,             1, 4,  fluent_decel
    animation = fadeLayers,       1, 3,  easeOutExpo

    animation = workspaces,       1, 5,  easeOutExpo, slide
    animation = specialWorkspace, 1, 4,  spring,      slidevert
}

# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
workspace = w[tv1], gapsout:2, gapsin:0
workspace = f[1], gapsout:0, gapsin:0
#  = pin, class:^(hanabi)$
#windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
#windowrule = rounding 0, floating:0, onworkspace:w[tv1]
#windowrule = bordersize 0, floating:0, onworkspace:f[1]
#windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    # pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hyprland.org/Configuring/Variables/#misc
misc {
    # force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
    # disable_hyprland_logo = false




 # If true disables the random hyprland logo / anime girl background. :(
}


#############
### INPUT ###
#############

# https://wiki.hyprland.org/Configuring/Variables/#input
input {
    kb_layout = us
    numlock_by_default = true
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
scroll_factor = 3
    follow_mouse = 1

    sensitivity = 1
    accel_profile = adaptive
    # -1.0 - 1.0, 0 means no modification. With flat profile, 0.8 ≈ 1.8x raw speed

    touchpad {
        natural_scroll = true
	scroll_factor = 2.0
    }

    
    
    
}


# https://wiki.hyprland.org/Configuring/Variables/#gestures
gestures {
    gesture = 3, horizontal, workspace
    # gesture = 3, 
#gesture = 3, up, mod: SUPER, scale: 1.5, fullscreen
#gesture = 3, left, scale: 1.5, float
# gesture = 2, pinchin killactive
}
# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = 1.0
}



###################
### KEYBINDINGS ###
###################

# See https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,#from session
bind = $mainMod, E, exec, nautilus
bind = $mainMod+shift, E, exec, dolphin

# bind = $mainMod+shift, G, togglefloating
#bind = Alt, space, exec, pkill -x rofi ||  rofi -show drun
bind = ALT, D, exec, bash -c "pgrep -x rofi && pkill rofi || ~/.config/rofi/launchers/type-3/launcher.sh"

bind = ALT, SPACE, exec, bash -c "pgrep -x rofi && pkill rofi || ~/.config/rofi/launchers/type-6/launcher.sh"

#bind = ALT, SPACE, exec, ~/.config/rofi/launchers/type-6/launcher.sh
bind = $mainMod, P, pseudo, # dwindle
# bind = $mainMod, J, togglesplit, # dwindle
bind = $mainMod, B, exec, brave --ozone-platform=wayland
bind = $mainMod, F, exec, firefox
#bind = $mainMod, V, exec, cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy
bind = $mainMod, V, exec, bash -c "pkill -x rofi || cliphist list | rofi -dmenu -display-columns 2 | cliphist decode | wl-copy"
bind = $mainMod, C, exec, code


# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# bind = $mainMod, P, exec, hyprpicker --autocopy


bind = SUPER SHIFT, S, exec, hyprshot -m region --save-as ~/Pictures/Screenshots/snap_$(date +'%Y-%m-%d_%H-%M-%S').png
# bind = ,print, exec, hyprshot -m output --clipboard --save
# bind = ,print, exec, hyprshot -m output --clipboard --save && notify-send "📸 Screenshot saved to ~/Pictures/hyprshot/"
# bind = ,print, exec, hyprshot -m output --save-as /home/batman/Pictures/Screenshots/snap_$(date +'%H-%M-%S').png
bind = ,print, exec, hyprshot -m output  --save-as ~/Pictures/Screenshots/snap_$(date +'%Y-%m-%d_%H-%M-%S').png




# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
#bind = $mainMod, S, togglespecialworkspace, magic
#bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 2%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 2%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# bind = ALT, TAB, swapnext
# bind = ALT, ESC, cyclenext
# bind = ALT, ESC, bringactivetotop
bind = SUPER, W, fullscreen
# bind = SUPER, G, layoutmsg, swapwithmaster



bind = SUPER ALT, LEFT, workspace, -1
bind = SUPER ALT, RIGHT, workspace, +1

