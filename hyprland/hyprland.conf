 include = ~/.config/hypr/plugins/dynamic-cursors.conf
plugin:dynamic-cursors {

    enabled = true
    mode = tilt
    threshold = 1

    # per-shape overrides (optional)
    # shaperule = <shape-name>, <mode> (optional), <property>: <value>, ...

    rotate {
        length = 50
        offset = 2.0
    }

    tilt {
        limit = 5000
        function = negative_quadratic
        window = 100
        full_tilt = 60
    }

    stretch {
        limit = 3000
        function = quadratic
        window = 100
    }

    shake {
        enabled = true
        nearest = true
        threshold = 6.0
        base = 4.0
        speed = 4.0
        influence = 0.0
        limit = 0.0
        timeout = 2000
        effects = false
        ipc = false
    }

    hyprcursor {
        nearest = true
        enabled = true
        resolution = -1
        fallback = clientside
    }
}
# Firefox PIP always on top
# bind = SUPER, A, exec, hyprctl dispatch hyprexpo:expo toggle
# bind = SUPER, I, exec, windowrule float size= 15%
windowrule {
    name = firefox-pip
    match:title = ^.*Picture(-| )in(-| )Picture.*$
    float = on
    pin = on
    size = 15% 15%
    move = monitor_w*0.70 monitor_h*0.70
}
windowrule {
    name = blueman-manager
    match:class = ^(blueman-manager)$
    float = on
    size = 25% 35%
    move = 73% 5%
}

# windowrule = opacity 0.80 $& 0.70 $& 1,match:class ^(blueman-manager)$
# windowrule = opacity 0.50 $& 0 $&,match:class ^(kitty)$

# windowrule = opacity 8 $& 0 $& 1,match:class ^([Cc]ode)$

bindde = $mainMod Shift, Right, $d resize window right , resizeactive, 30 0
bindde = $mainMod Shift, Left, $d resize window left, resizeactive, -30 0
bindde = $mainMod Shift, Up, $d resize window up, resizeactive, 0 -30
bindde = $mainMod Shift, Down, $d resize  window down, resizeactive, 0 30

