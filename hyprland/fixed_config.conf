monitor=,preferred,auto,1

$terminal = kitty
$menu = rofi --show drun
$mainMod = SUPER

exec-once = dunst & playerctl
exec-once = nm-applet & blueman-applet &
exec-once = waybar &
exec-once = snappy-switcher --daemon

env = XCURSOR_THEME,LiOSV
env = XCURSOR_SIZE,32

general {
    gaps_in = 4
    gaps_out = 4
    border_size = 0
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 8
    active_opacity = 1.0
    inactive_opacity = 0.9
    blur {
        enabled = true
        size = 2
        passes = 1
    }
}

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = crazyshot, 0.1, 1.5, 0.76, 0.92
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = fluent_decel, 0.1, 1, 0, 1
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1

    animation = windows, 1, 3, md3_decel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 2.5, md3_decel
    animation = workspaces, 1, 3.5, easeOutExpo, slide
    animation = specialWorkspace, 1, 3, md3_decel, slide
}

dwindle {
    pseudotile = true
    preserve_split = true
}

input {
    kb_layout = us
    numlock_by_default = true
    scroll_factor = 1200
    follow_mouse = 1
    sensitivity = 2.0
    touchpad {
        natural_scroll = true
        scroll_factor = 2.0
    }
}

gestures {
    gesture = 3, horizontal, workspace
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

cursor {
    inactive_timeout = 5
    hide_on_key_press = true
    hide_on_mouse_leave = true
}

windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = float, title:^(Open)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Authentication Required)$
windowrulev2 = float, class:^([Ff]irefox)$, title:^(Picture-in-Picture)$
windowrulev2 = pin, class:^(Picture-in-Picture)$

windowrulev2 = opacity 0.90 0.80, class:^(kitty)$
windowrulev2 = opacity 0.95 0.85, class:^(firefox)$
windowrulev2 = opacity 0.85 0.75, class:^(brave)$
windowrulev2 = opacity 0.90 0.80, class:^(Code)$
windowrulev2 = opacity 0.80 0.70, class:^(discord)$

windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nm-applet)$
windowrulev2 = float, class:^(pavucontrol)$

layerrule = blur, rofi
layerrule = ignorezero, rofi
layerrule = blur, waybar

bind = $mainMod, T, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, E, exec, nautilus
bind = $mainMod+shift, G, togglefloating,
bind = $mainMod, P, pseudo,
bind = $mainMod, J, togglesplit,
bind = $mainMod, W, fullscreen

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

bind = ALT, TAB, swapnext
bind = ALT, ESC, cyclenext
bind = SUPER, Tab, exec, snappy-switcher next
bind = ALT, Tab, exec, snappy-switcher prev
bind = SUPER, A, exec, hyprctl dispatch hyprexpo:expo toggle

bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 1%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 1%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

bind = , print, exec, hyprshot -m output --save-as ~/Pictures/Screenshots/snap_$(date +'%Y-%m-%d_%H-%M-%S').png
bind = $mainMod SHIFT, S, exec, hyprshot -m region --save-as ~/Pictures/Screenshots/snap_$(date +'%Y-%m-%d_%H-%M-%S').png

bindde = $mainMod Shift, Right, resizeactive, 30 0
bindde = $mainMod Shift, Left, resizeactive, -30 0
bindde = $mainMod Shift, Up, resizeactive, 0 -30
bindde = $mainMod Shift, Down, resizeactive, 0 30

plugin:dynamic-cursors {
    enabled = true
    mode = tilt
    threshold = 2
    tilt {
        limit = 5000
        function = negative_quadratic
        window = 100
        full_tilt = 60
    }
    hyprcursor {
        enabled = true
    }
}

plugin:hyprexpo {
    path = ~/.config/hypr/plugins/hyprexpo.so
    columns = 2
    gap_size = 6
    bg_col = rgba(000000cc)
    workspace_method = center current
    scale = 0.35
}

# Special workspace - hidden scratchpad
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Touchpad gestures
gesture = 3, up, exec, playerctl play-pause
gesture = 3, down, exec, playerctl stop
gesture = 2, pinch, exec, brightnessctl -e2 set 2%+

# Group styling
group {
    col.border_active = rgba(caff5fff) rgba(f2d5cfff) 45deg
    col.border_inactive = rgba(b4befecc) rgba(6c7086cc) 45deg
    col.border_locked_active = rgba(ff6b6bff) rgba(ff6b6bff) 45deg
    col.border_locked_inactive = rgba(b4befecc) rgba(6c7086cc) 45deg
}